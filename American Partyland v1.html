<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>American Partyland — Petreceri de copii cu suflet</title>
<meta name="description" content="American Partyland — locația unde aniversările copiilor devin amintiri. 1.000 m² de grădină, saloane interioare, decor personalizat, animatori." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/Marquee.jsx"></script>
<script type="text/babel" src="components/About.jsx"></script>
<script type="text/babel" src="components/Services.jsx"></script>
<script type="text/babel" src="components/Experience.jsx"></script>
<script type="text/babel" src="components/Gallery.jsx"></script>
<script type="text/babel" src="components/Portfolio.jsx"></script>
<script type="text/babel" src="components/Testimonials.jsx"></script>
<script type="text/babel" src="components/Booking.jsx"></script>
<script type="text/babel" src="components/Contact.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>

<script type="text/babel">
const App = () => {
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add('in');
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <Marquee />
      <About />
      <Services />
      <Experience />
      <Gallery />
      <Portfolio />
      <Testimonials />
      <Booking />
      <Contact />
      <Footer />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
